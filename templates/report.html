<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report — TikTok Auditor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Header -->
<header class="site-header">
    <div class="logo">TikTok <em>Auditor</em></div>
    <div class="header-actions">
        <a href="{{ back_url or ('/channel/' ~ username) }}">← Back</a>
        <a href="{{ download_url or ('/api/report/' ~ username ~ '/' ~ filename ~ '/download') }}" class="btn btn-ghost btn-sm">Download .md</a>
        {% if delete_url %}
        <button class="btn btn-danger btn-sm" onclick="deleteCurrent()">Delete</button>
        {% endif %}
    </div>
</header>

<div class="layout">
    <div class="report-container" id="report-content">
        <p style="color: var(--text-muted);">Loading report…</p>
    </div>
</div>

<script>
    // Configure marked — disable strikethrough (tildes common in TikTok content)
    marked.setOptions({
        breaks: false,
        gfm: true,
        headerIds: false,
        mangle: false
    });

    // Override the del (strikethrough) tokenizer so ~tildes~ render as plain text
    const renderer = new marked.Renderer();
    renderer.del = function(text) {
        return '~' + text + '~';
    };
    marked.setOptions({ renderer });

    // Render the markdown
    const raw = {{ content | tojson }};
    document.getElementById('report-content').innerHTML = marked.parse(raw);

    {% if delete_url %}
    async function deleteCurrent() {
        const label = {{ (delete_label or 'Delete this file') | tojson }};
        if (!confirm(label + '?\n\nThis cannot be undone.')) return;
        try {
            const res = await fetch({{ delete_url | tojson }}, { method: 'POST' });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.success) {
                window.location.href = {{ (delete_redirect or back_url or '/') | tojson }};
            } else {
                alert('Delete failed: ' + (data.error || ('HTTP ' + res.status)));
            }
        } catch (e) {
            alert('Network error: ' + e.message);
        }
    }
    {% endif %}
</script>
</body>
</html>
